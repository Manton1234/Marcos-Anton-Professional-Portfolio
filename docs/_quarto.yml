format:
  html:
    theme:
      - cosmo
      - theme.scss
    toc: true
    toc-location: right
    code-copy: true
    anchor-sections: true
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true
    page-layout: full

execute:
  freeze: auto
  echo: true
  warning: false
  message: false
